<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test D - Docker & Compose commandes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{color-scheme:dark;--background:#09090b;--foreground:#f4f4f5;--card:#18181b;--border:#27272a;--muted:#a1a1aa;--primary:#10b981;--primary-soft:rgba(16,185,129,.18)}
*{box-sizing:border-box}
body{font-family:"Space Grotesk","IBM Plex Sans","Segoe UI",sans-serif;background:var(--background);color:var(--foreground);line-height:1.6;margin:0;min-height:100vh;background-image:radial-gradient(circle at 82% 4%,rgba(16,185,129,.11),transparent 36%),radial-gradient(circle at 9% 90%,rgba(16,185,129,.08),transparent 38%)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:linear-gradient(to right,rgba(113,113,122,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(113,113,122,.08) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 60% 52% at 50% 40%,#000 50%,transparent 100%)}
.container{max-width:1000px;margin:0 auto;padding:28px 18px 52px}
.header-bar{display:inline-flex;align-items:center;border:1px solid rgba(16,185,129,.45);background:var(--primary-soft);color:#34d399;padding:8px 14px;border-radius:999px;margin-bottom:16px;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
h1{font-size:1.8rem;margin:0 0 8px 0;letter-spacing:-.02em}
.subtitle{color:var(--muted);margin-bottom:18px}
.panel{background:rgba(24,24,27,.72);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 24px 44px -34px rgba(4,6,10,.9);backdrop-filter:blur(4px)}
.q-item{padding:12px;border:1px solid rgba(63,63,70,.78);border-radius:10px;margin:10px 0;background:rgba(9,9,11,.74)}
.q-item p{margin:0 0 8px 0;font-weight:600}
.options label{display:block;margin:6px 0}
button{border:1px solid rgba(16,185,129,.5);border-radius:8px;padding:10px 14px;background:linear-gradient(135deg,#34d399,#10b981);color:#08130f;font-weight:700;cursor:pointer}
.result{margin-top:10px;padding:10px 12px;border-radius:8px;background:#0d1728;border:1px solid #1f2d45}
.ok{color:#34d399;font-weight:700}
.ko{color:#f87171;font-weight:700}
.pending{color:#cbd5e1;font-weight:700}
.back{margin-bottom:10px}
.back a{text-decoration:none;color:#6ee7b7;font-weight:600}
small,.note{color:var(--muted)}
</style>
</head>
<body>
<div class="container">
  <div class="header-bar"><strong>Test technique</strong></div>
  <p class="back"><a href="index.html">&larr; Retour aux tests</a></p>
  <h1>Test D - Commandes Docker & Docker Compose</h1>
  <p class="subtitle">24 questions pratiques orientees exploitation DevOps, fullstack et data (debug, reseau, volumes, ETL, runbook).</p>

  <section class="panel">
    <h2>Questions</h2>
    <form id="questions"></form>
    <button type="button" id="grade-btn">Corriger ce theme</button>
    <div id="result" class="result" aria-live="polite">Aucune correction lancee.</div>
    <div id="decision" class="result" aria-live="polite">Decision globale en attente.</div>
  </section>
</div>

<script>
const CONFIG = { themeKey: 'dockerComposeCmd' };
const STORE_KEY = 'testTechScoresDarkV1';
const requiredForRdv = ['dockerComposeCmd'];
const thresholds = { dockerComposeCmd: 65 };

const payload = {
  title: 'Commandes Docker & Compose',
  questions: [
    { id: 1, q: 'Tu veux verifier l etat des conteneurs actifs uniquement. Quelle commande ?', options: ['docker images', 'docker ps', 'docker ps -a', 'docker inspect'], answer: 1 },
    { id: 2, q: 'Pour suivre les logs en temps reel du service api via Compose :', options: ['docker compose logs -f api', 'docker compose inspect api', 'docker logs api --once', 'docker compose ps -f api'], answer: 0 },
    { id: 3, q: 'Tu modifies un Dockerfile de api et veux rebuild + relancer api en une commande :', options: ['docker compose pull api', 'docker compose up -d --build api', 'docker compose restart api', 'docker build api'], answer: 1 },
    { id: 4, q: 'Quelle commande valide et affiche la config Compose fusionnee ?', options: ['docker compose config', 'docker compose check', 'docker inspect compose.yml', 'docker compose doctor'], answer: 0 },
    { id: 5, q: 'Difference cle entre exec et run (Compose) :', options: ['aucune', 'exec cree un conteneur neuf, run utilise l existant', 'exec utilise un conteneur existant, run lance un conteneur one-shot', 'run ne peut pas recevoir de commande'], answer: 2 },
    { id: 6, q: 'Pour lancer un job ETL ponctuel sans laisser de conteneur parasite :', options: ['docker compose exec etl python jobs/load.py', 'docker compose run --rm etl python jobs/load.py', 'docker compose up etl', 'docker run etl jobs/load.py sans rm'], answer: 1 },
    { id: 7, q: 'Tu veux ouvrir un shell dans un conteneur api deja demarre :', options: ['docker compose run api sh', 'docker compose exec api sh', 'docker compose shell api', 'docker inspect api sh'], answer: 1 },
    { id: 8, q: 'Quelle commande montre CPU/RAM reseau en direct des conteneurs ?', options: ['docker compose top', 'docker stats', 'docker inspect --resources', 'docker ps --size'], answer: 1 },
    { id: 9, q: 'Pour publier le port 8000 du conteneur vers 8000 host :', options: ['EXPOSE 8000 dans Dockerfile uniquement', 'ports: ["8000:8000"]', 'expose: ["8000:8000"]', 'network_mode: host obligatoire'], answer: 1 },
    { id: 10, q: 'EXPOSE dans un Dockerfile sert principalement a :', options: ['publier le port sur l hote', 'documenter le port interne de l image', 'activer TLS', 'creer un healthcheck'], answer: 1 },
    { id: 11, q: 'Tu veux voir tous les conteneurs, y compris arretes :', options: ['docker ps', 'docker ps -a', 'docker compose logs', 'docker container list --running'], answer: 1 },
    { id: 12, q: 'Commande la plus adaptee pour diagnostiquer les mounts et variables d un conteneur :', options: ['docker inspect <container>', 'docker top <container>', 'docker history <image>', 'docker search <image>'], answer: 0 },
    { id: 13, q: 'PostgreSQL perd ses donnees apres down/up. Cause la plus probable :', options: ['pas de volume persistant sur /var/lib/postgresql/data', 'manque de RAM', 'docker compose ps non execute', 'port 5432 ferme'], answer: 0 },
    { id: 14, q: 'Commande potentiellement destructive qui supprime stack + volumes :', options: ['docker compose stop', 'docker compose down', 'docker compose down -v', 'docker compose rm api'], answer: 2 },
    { id: 15, q: 'Pour copier un fichier local vers un conteneur db :', options: ['docker cp ./seed.sql db:/tmp/seed.sql', 'docker mount ./seed.sql db', 'docker compose transfer seed.sql db', 'docker exec cp ./seed.sql /tmp'], answer: 0 },
    { id: 16, q: 'Un service est Up mais casse en 500. Quelle 1ere action pragmatique ?', options: ['docker compose logs --tail 200 api', 'docker compose down -v', 'docker system prune -a', 'docker compose pull api'], answer: 0 },
    { id: 17, q: 'Pour verifier les services d une stack Compose :', options: ['docker compose ps', 'docker network ls', 'docker image ls', 'docker volume ls'], answer: 0 },
    { id: 18, q: 'Tu veux telecharger les nouvelles images referencees sans lancer les services :', options: ['docker compose up -d', 'docker compose build', 'docker compose pull', 'docker pull compose.yml'], answer: 2 },
    { id: 19, q: 'depends_on seul garantit surtout :', options: ['que la DB accepte deja les connexions', 'l ordre de demarrage', 'la securite IAM', 'la persistance disque'], answer: 1 },
    { id: 20, q: 'healthcheck permet surtout de :', options: ['renommer le service', 'verifier periodiquement la disponibilite reelle', 'ouvrir les ports', 'accelerer le build'], answer: 1 },
    { id: 21, q: 'Si un conteneur devient unhealthy, Docker :', options: ['le redemarre toujours immediatement', 'supprime le volume', 'le marque unhealthy mais ne le redemarre pas forcement', 'arrete tous les services'], answer: 2 },
    { id: 22, q: 'Pour lancer uniquement le service worker en arriere-plan :', options: ['docker compose up -d worker', 'docker compose start -a worker', 'docker up worker', 'docker run worker compose'], answer: 0 },
    { id: 23, q: 'Commande utile pour nettoyer uniquement les volumes non utilises :', options: ['docker system prune -a', 'docker volume prune', 'docker compose rm -v', 'docker container prune'], answer: 1 },
    { id: 24, q: 'Dans un reseau Compose, api doit joindre la base. Hostname conseille dans la config api :', options: ['127.0.0.1', 'localhost', 'nom du service db', 'adresse IP hote fixe'], answer: 2 }
  ]
};

function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch (err) { return {}; } }
function saveStore(store) { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

function globalScoreRdv(store) {
  const score = requiredForRdv.reduce((acc, k) => acc + Number((store[k] && store[k].score) || 0), 0);
  const maxTotal = requiredForRdv.reduce((acc, k) => {
    const max = store[k] && typeof store[k].max === 'number' ? store[k].max : payload.questions.length;
    return acc + Number(max || 0);
  }, 0);
  const completedThemes = requiredForRdv.filter((k) => store[k] && store[k].completed).length;
  const percent = maxTotal ? (score / maxTotal) * 100 : 0;
  return { score, maxTotal, percent, completedThemes, totalThemes: requiredForRdv.length };
}

function computeDecision(store) {
  const missing = requiredForRdv.filter((k) => !store[k] || !store[k].completed);
  if (missing.length) return { status: 'incomplete', missing };
  const failed = requiredForRdv.filter((k) => (store[k].percent || 0) < thresholds[k]);
  if (failed.length) return { status: 'no', failed };
  return { status: 'yes' };
}

function renderDecision() {
  const store = loadStore();
  const d = computeDecision(store);
  const global = globalScoreRdv(store);
  const box = document.getElementById('decision');

  if (d.status === 'incomplete') {
    box.innerHTML = `<span class="pending">Decision : en attente</span><br><small>Theme incomplet : ${d.missing.join(', ')}. Score actuel : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
    return;
  }
  if (d.status === 'no') {
    box.innerHTML = `<span class="ko">Decision : NON</span><br><small>Seuil non atteint sur : ${d.failed.join(', ')}. Score global : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
    return;
  }
  box.innerHTML = `<span class="ok">Decision : OUI</span><br><small>Niveau operationnel sur les commandes Docker/Compose. Score : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
}

function getThemeData() {
  const store = loadStore();
  return store[CONFIG.themeKey] || { answers: {}, score: 0, max: 0, percent: 0, completed: false };
}

function renderQuestions() {
  const form = document.getElementById('questions');
  const saved = getThemeData().answers || {};
  form.innerHTML = payload.questions.map((q, index) => {
    const options = q.options.map((opt, i) => {
      const checked = Number(saved[q.id]) === i ? 'checked' : '';
      return `<label><input type="radio" name="q-${q.id}" value="${i}" ${checked}> ${opt}</label>`;
    }).join('');
    return `<div class="q-item"><p>${index + 1}. ${q.q}</p><div class="options">${options}</div></div>`;
  }).join('');
}

function collectAnswers() {
  const answers = {};
  payload.questions.forEach((q) => {
    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
    if (selected) answers[q.id] = Number(selected.value);
  });
  return answers;
}

function evaluateAnswers(answers) {
  const total = payload.questions.length;
  let answered = 0;
  let correct = 0;
  payload.questions.forEach((q) => {
    if (!Object.prototype.hasOwnProperty.call(answers, q.id)) return;
    answered += 1;
    if (Number(answers[q.id]) === Number(q.answer)) correct += 1;
  });
  const completed = answered === total;
  const percent = total ? (correct / total) * 100 : 0;
  return { total, answered, correct, completed, percent };
}

function saveThemeFromAnswers(answers) {
  const evaluation = evaluateAnswers(answers);
  const store = loadStore();
  store[CONFIG.themeKey] = { answers, score: evaluation.correct, max: evaluation.total, percent: evaluation.percent, completed: evaluation.completed };
  saveStore(store);
  return evaluation;
}

function renderResult(evaluation) {
  const result = document.getElementById('result');
  if (!evaluation.completed) {
    result.innerHTML = `<span class="pending">Incomplet</span><br><small>Repondu : ${evaluation.answered}/${evaluation.total}. Score provisoire : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%).</small>`;
    return;
  }
  const ok = evaluation.percent >= thresholds[CONFIG.themeKey];
  const cls = ok ? 'ok' : 'ko';
  const label = ok ? 'Seuil atteint' : 'Seuil non atteint';
  result.innerHTML = `<span class="${cls}">${label}</span><br><small>Score : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%). Seuil requis : ${thresholds[CONFIG.themeKey]}%.</small>`;
}

document.getElementById('grade-btn').addEventListener('click', () => {
  const answers = collectAnswers();
  const evaluation = saveThemeFromAnswers(answers);
  renderResult(evaluation);
  renderDecision();
});

renderQuestions();
renderDecision();
</script>
</body>
</html>

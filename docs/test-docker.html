<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test A - Docker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{color-scheme:dark;--background:#09090b;--foreground:#f4f4f5;--card:#18181b;--border:#27272a;--muted:#a1a1aa;--primary:#10b981;--primary-soft:rgba(16,185,129,.18)}
*{box-sizing:border-box}
body{font-family:"Space Grotesk","IBM Plex Sans","Segoe UI",sans-serif;background:var(--background);color:var(--foreground);line-height:1.6;margin:0;min-height:100vh;background-image:radial-gradient(circle at 82% 4%,rgba(16,185,129,.11),transparent 36%),radial-gradient(circle at 9% 90%,rgba(16,185,129,.08),transparent 38%)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:linear-gradient(to right,rgba(113,113,122,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(113,113,122,.08) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 60% 52% at 50% 40%,#000 50%,transparent 100%)}
.container{max-width:1000px;margin:0 auto;padding:28px 18px 52px}
.header-bar{display:inline-flex;align-items:center;border:1px solid rgba(16,185,129,.45);background:var(--primary-soft);color:#34d399;padding:8px 14px;border-radius:999px;margin-bottom:16px;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
h1{font-size:1.8rem;margin:0 0 8px 0;letter-spacing:-.02em}
.subtitle{color:var(--muted);margin-bottom:18px}
.panel{background:rgba(24,24,27,.72);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 24px 44px -34px rgba(4,6,10,.9);backdrop-filter:blur(4px)}
.q-item{padding:12px;border:1px solid rgba(63,63,70,.78);border-radius:10px;margin:10px 0;background:rgba(9,9,11,.74)}
.q-item p{margin:0 0 8px 0;font-weight:600}
.options label{display:block;margin:6px 0}
button{border:1px solid rgba(16,185,129,.5);border-radius:8px;padding:10px 14px;background:linear-gradient(135deg,#34d399,#10b981);color:#08130f;font-weight:700;cursor:pointer}
.result{margin-top:10px;padding:10px 12px;border-radius:8px;background:#0d1728;border:1px solid #1f2d45}
.ok{color:#34d399;font-weight:700}
.ko{color:#f87171;font-weight:700}
.pending{color:#cbd5e1;font-weight:700}
.back{margin-bottom:10px}
.back a{text-decoration:none;color:#6ee7b7;font-weight:600}
small,.note{color:var(--muted)}
</style>
</head>
<body>
<div class="container">
  <div class="header-bar"><strong>Test technique</strong></div>
  <p class="back"><a href="index.html">← Retour aux tests</a></p>
  <h1>Test A - Docker fondamentaux</h1>
  <p class="subtitle">20 questions QCM basées sur le cours d'introduction Docker.</p>

  <section class="panel">
    <h2>Questions</h2>
    <form id="questions"></form>
    <button type="button" id="grade-btn">Corriger ce thème</button>
    <div id="result" class="result" aria-live="polite">Aucune correction lancée.</div>
    <div id="decision" class="result" aria-live="polite">Décision globale en attente.</div>
  </section>
</div>

<script>
const CONFIG = { themeKey: 'docker' };
const STORE_KEY = 'testTechScoresDarkV1';
const requiredForRdv = ['docker', 'conception', 'pythonApi'];
const thresholds = { docker: 60, conception: 60, pythonApi: 60 };

const payload = {
  title: 'Docker fondamentaux',
  questions: [
    { id: 1, q: 'Quel fichier sert de recette pour construire une image ?', options: ['docker-compose.yml', 'Dockerfile', '.env', 'package.json'], answer: 1 },
    { id: 2, q: 'La commande `docker build .` produit :', options: ['un conteneur en cours d\'exécution', 'une image Docker', 'un volume', 'un réseau externe'], answer: 1 },
    { id: 3, q: 'Un conteneur est :', options: ['un éditeur de configuration', 'une image en exécution', 'une archive zip', 'un plugin Docker Desktop'], answer: 1 },
    { id: 4, q: 'Dans un conteneur, `localhost` pointe vers :', options: ['la machine hôte', 'n\'importe quel conteneur', 'le conteneur lui-même', 'internet'], answer: 2 },
    { id: 5, q: 'Avec Docker Compose, deux services communiquent via :', options: ['leurs numéros de processus', 'le nom du service', 'leur UID Linux', 'leur mot de passe'], answer: 1 },
    { id: 6, q: 'Le mapping `3000:3000` signifie :', options: ['3000 conteneurs vers 3000 machines', 'port machine 3000 vers port conteneur 3000', '3000 requêtes max', '3000 MB mémoire'], answer: 1 },
    { id: 7, q: 'Sans volume, supprimer un conteneur PostgreSQL entraîne :', options: ['la conservation des données', 'la perte des données du conteneur', 'la sauvegarde automatique sur Git', 'aucun impact'], answer: 1 },
    { id: 8, q: 'Le rôle principal de Docker est :', options: ['compresser les images', 'isoler et reproduire les environnements', 'remplacer Git', 'générer du code'], answer: 1 },
    { id: 9, q: '`image: postgres:16` dans Compose veut dire :', options: ['compiler Postgres localement', 'télécharger une image existante', 'lancer 16 bases', 'activer SSL uniquement'], answer: 1 },
    { id: 10, q: '`build: .` dans Compose veut dire :', options: ['utiliser l\'image Docker Hub seulement', 'chercher un Dockerfile et construire l\'image', 'lire un fichier .env', 'lancer directement le conteneur'], answer: 1 },
    { id: 11, q: '`depends_on` garantit surtout :', options: ['la disponibilité applicative complète', 'l\'ordre de démarrage', 'la persistance', 'la sécurité réseau'], answer: 1 },
    { id: 12, q: 'Pour attendre réellement que PostgreSQL soit prêt, on utilise :', options: ['ports', 'depends_on simple', 'healthcheck + condition service_healthy', 'docker ps'], answer: 2 },
    { id: 13, q: 'Le réseau créé par Docker Compose est en général :', options: ['public sur internet', 'privé au projet', 'obligatoirement chiffré TLS', 'impossible à utiliser'], answer: 1 },
    { id: 14, q: 'Dans `host: "postgres"`, `postgres` représente :', options: ['un mot de passe', 'le nom du service de base de données', 'une variable shell', 'le nom du réseau Linux'], answer: 1 },
    { id: 15, q: 'Différence image/conteneur :', options: ['aucune', 'image statique, conteneur dynamique', 'conteneur statique, image dynamique', 'les deux sont des volumes'], answer: 1 },
    { id: 16, q: 'Pourquoi utiliser des conteneurs différents pour Node 18 et Node 24 ?', options: ['pour réduire le CPU uniquement', 'pour éviter les conflits de versions', 'pour éviter la connexion internet', 'pour supprimer les tests'], answer: 1 },
    { id: 17, q: 'Le dossier monté `/var/lib/postgresql/data` sert à :', options: ['stocker les logs Nginx', 'persister les données PostgreSQL', 'définir les ports', 'héberger le Dockerfile'], answer: 1 },
    { id: 18, q: 'Une bonne séquence logique est :', options: ['docker run -> Dockerfile -> build', 'Dockerfile -> build -> image -> run', 'image -> Dockerfile -> run', 'volume -> image -> Dockerfile'], answer: 1 },
    { id: 19, q: 'Dans Docker, plusieurs applis sur la même machine sont gérées grâce à :', options: ['un seul Python global', 'l\'isolation des conteneurs', 'un unique port obligatoire', 'l\'absence de réseau'], answer: 1 },
    { id: 20, q: 'Le but d\'un `healthcheck` est :', options: ['renommer le conteneur', 'vérifier périodiquement la santé réelle du service', 'exposer un port', 'installer les dépendances'], answer: 1 }
  ]
};

function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch (err) { return {}; } }
function saveStore(store) { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }

function globalScoreRdv(store) {
  const score = requiredForRdv.reduce((acc, k) => acc + Number((store[k] && store[k].score) || 0), 0);
  const maxTotal = requiredForRdv.reduce((acc, k) => {
    const max = store[k] && typeof store[k].max === 'number' ? store[k].max : 20;
    return acc + Number(max || 0);
  }, 0);
  const completedThemes = requiredForRdv.filter((k) => store[k] && store[k].completed).length;
  const percent = maxTotal ? (score / maxTotal) * 100 : 0;
  return { score, maxTotal, percent, completedThemes, totalThemes: requiredForRdv.length };
}

function computeDecision(store) {
  const missing = requiredForRdv.filter((k) => !store[k] || !store[k].completed);
  if (missing.length) return { status: 'incomplete', missing };
  const failed = requiredForRdv.filter((k) => (store[k].percent || 0) < thresholds[k]);
  if (failed.length) return { status: 'no', failed };
  return { status: 'yes' };
}

function renderDecision() {
  const store = loadStore();
  const d = computeDecision(store);
  const global = globalScoreRdv(store);
  const box = document.getElementById('decision');

  if (d.status === 'incomplete') {
    box.innerHTML = `<span class="pending">Décision : en attente</span><br><small>Tests manquants/incomplets : ${d.missing.join(', ')}. Score global actuel : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%), tests terminés : ${global.completedThemes}/${global.totalThemes}.</small>`;
    return;
  }
  if (d.status === 'no') {
    box.innerHTML = `<span class="ko">Décision : NON</span><br><small>Thèmes sous le seuil : ${d.failed.join(', ')}. Score global : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
    return;
  }
  box.innerHTML = `<span class="ok">Décision : OUI</span><br><small>Profil cohérent pour un rendez-vous technique. Score global : ${global.score}/${global.maxTotal} (${global.percent.toFixed(1)}%).</small>`;
}

function getThemeData() {
  const store = loadStore();
  return store[CONFIG.themeKey] || { answers: {}, score: 0, max: 0, percent: 0, completed: false };
}

function renderQuestions() {
  const form = document.getElementById('questions');
  const saved = getThemeData().answers || {};
  form.innerHTML = payload.questions.map((q, index) => {
    const options = q.options.map((opt, i) => {
      const checked = Number(saved[q.id]) === i ? 'checked' : '';
      return `<label><input type="radio" name="q-${q.id}" value="${i}" ${checked}> ${opt}</label>`;
    }).join('');
    return `<div class="q-item"><p>${index + 1}. ${q.q}</p><div class="options">${options}</div></div>`;
  }).join('');
}

function collectAnswers() {
  const answers = {};
  payload.questions.forEach((q) => {
    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
    if (selected) answers[q.id] = Number(selected.value);
  });
  return answers;
}

function evaluateAnswers(answers) {
  const total = payload.questions.length;
  let answered = 0;
  let correct = 0;
  payload.questions.forEach((q) => {
    if (!Object.prototype.hasOwnProperty.call(answers, q.id)) return;
    answered += 1;
    if (Number(answers[q.id]) === Number(q.answer)) correct += 1;
  });
  const completed = answered === total;
  const percent = total ? (correct / total) * 100 : 0;
  return { total, answered, correct, completed, percent };
}

function saveThemeFromAnswers(answers) {
  const evaluation = evaluateAnswers(answers);
  const store = loadStore();
  store[CONFIG.themeKey] = { answers, score: evaluation.correct, max: evaluation.total, percent: evaluation.percent, completed: evaluation.completed };
  saveStore(store);
  return evaluation;
}

function renderResult(evaluation) {
  const result = document.getElementById('result');
  if (!evaluation.completed) {
    result.innerHTML = `<span class="pending">Incomplet</span><br><small>Répondu : ${evaluation.answered}/${evaluation.total}. Score provisoire : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%).</small>`;
    return;
  }
  const ok = evaluation.percent >= thresholds[CONFIG.themeKey];
  const cls = ok ? 'ok' : 'ko';
  const label = ok ? 'Seuil atteint' : 'Seuil non atteint';
  result.innerHTML = `<span class="${cls}">${label}</span><br><small>Score : ${evaluation.correct}/${evaluation.total} (${evaluation.percent.toFixed(1)}%). Seuil requis : ${thresholds[CONFIG.themeKey]}%.</small>`;
}

document.getElementById('grade-btn').addEventListener('click', () => {
  const answers = collectAnswers();
  const evaluation = saveThemeFromAnswers(answers);
  renderResult(evaluation);
  renderDecision();
});

renderQuestions();
renderDecision();
</script>
</body>
</html>
